name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}
      - run: mix deps.get --only dev
      - run: mix format --check-formatted

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}
      - run: mix deps.get --only test
      - run: mix test

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check @moduledoc coverage
        run: |
          if grep -r '@moduledoc false' lib/; then
            echo "error: @moduledoc false found in lib/" >&2
            exit 1
          fi
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}
      - run: mix deps.get --only dev
      - run: mix docs

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: dialyzer-${{ runner.os }}-${{ hashFiles('mix.lock') }}
      - run: mix deps.get --only dev
      - run: mix dialyzer
